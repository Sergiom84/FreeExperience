<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="free_experience">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>free_experience</title>
  <link rel="manifest" href="manifest.json">

  <!--
    El paquete `passkeys_web` (dependencia transitiva de supabase_flutter) se
    autorregistra en web y llama a `PasskeyAuthenticator.init()` durante el
    arranque del engine, antes de `main()`. Si el SDK JS de Passkeys no está
    presente, lanza "reading 'init' of undefined" y deja la pantalla en blanco.
    Como aún no usamos autenticación por passkeys en web, definimos un stub
    no operativo para que el registro no falle. Para habilitar passkeys reales,
    sustituir este stub por el bundle.js oficial de corbado/flutter-passkeys.
  -->
  <script>
    window.PasskeyAuthenticator = window.PasskeyAuthenticator || { init: function () {} };
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
