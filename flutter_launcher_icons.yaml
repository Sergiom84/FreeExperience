flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  # Sin esto, Android >= 8 aplica su propia mascara al icono cuadrado legacy
  # y lo encoge con relleno blanco alrededor (icono "flotando" en un circulo
  # blanco). El fondo oscuro coincide con las esquinas de icon.png para que
  # el recorte de la mascara sea invisible.
  adaptive_icon_background: "#050B14"
  adaptive_icon_foreground: "assets/icon/icon.png"
  web:
    generate: true
    image_path: "assets/icon/icon.png"
